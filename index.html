<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testa Chile - Catálogo de Productos</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <!-- Model Viewer para logo 3D -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body>
    <!-- Logo 3D fijo -->
    <!-- LOGO 3D GIRATORIO -->
    <div class="logo-3d-container">
      <model-viewer 
        src="assets/logotesta.glb"
        alt="Logo 3D"
        auto-rotate
        rotation-per-second="45deg"
        camera-orbit="0deg 90deg 105%"
        field-of-view="1deg"
        min-field-of-view="1deg"
        max-field-of-view="1deg"
        disable-zoom
        disable-pan
        interaction-prompt="none"
        loading="eager"
        shadow-intensity="0">
      </model-viewer>
    </div>

    <!-- Botones sociales esquina superior derecha -->
    <div class="social-buttons">
        <div class="social-btn-container">
            <span class="social-tooltip">Cotiza directo por WhatsApp</span>
            <a href="https://wa.me/1234567890" target="_blank" class="social-btn whatsapp-btn">WhatsApp</a>
        </div>
        <div class="social-btn-container">
            <span class="social-tooltip">¡Síguenos en Instagram!</span>
            <a href="https://instagram.com/tuusuario" target="_blank" class="social-btn instagram-btn">Instagram</a>
        </div>
        <div class="social-btn-container">
            <span class="social-tooltip">¡Encuéntranos en el mapa!</span>
            <a href="https://maps.google.com" target="_blank" class="social-btn location-btn">Ubicación</a>
        </div>
    </div>

    <header>
        <h1>Testa Chile - Catálogo de Productos</h1>
    </header>
    <main>
        <div id="mosaic-container" class="mosaic">
            <!-- Cards se generarán dinámicamente con JS -->
        </div>
    </main>

    <!-- Overlay para vista ampliada -->
    <div id="overlay" class="overlay">
        <div class="overlay-content">
            <h2 id="product-title"></h2>
            <!-- Panel de especificaciones deslizante -->
            <div id="specs-panel" class="specs-panel">
                <div class="specs-content">
                    <p id="specs-dimensions"></p>
                    <p id="specs-description"></p>
                </div>
            </div>
            <!-- Flechas de navegación -->
            <button id="nav-prev" class="nav-arrow nav-prev">&#10094;</button>
            <button id="nav-next" class="nav-arrow nav-next">&#10095;</button>
            <img id="large-image" src="" alt="">
            <div id="indicators" class="indicators"></div>
            <div class="contact-buttons">
                <div class="instagram-container">
                    <a id="instagram-btn" href="" target="_blank" class="contact-btn">Instagram</a>
                    <div class="instagram-tooltip">Ve este y otros productos aquí</div>
                </div>
                <div class="whatsapp-container">
                    <a id="whatsapp-btn" href="" target="_blank" class="contact-btn">WhatsApp</a>
                    <div class="whatsapp-tooltip">Cotiza directamente por WhatsApp</div>
                </div>
            </div>
            <button id="close-btn" class="close-btn">×</button>
        </div>
    </div>
    <script src="products.js"></script>
    <script src="script.js"></script>
</body>
</html>
